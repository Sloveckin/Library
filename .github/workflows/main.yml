name: main.yml
on:
  push

jobs:
  Build-Server:
    needs: [Test-Server]
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: set up go
        uses: actions/setup-go@v6
        with:
            working-directory: server
            go-version: '1.25'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
            working-directory: server

  Test-Server:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{matrix.os}}
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: set up go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: test
        working-directory: server
        run: go test ./internal/service/author/

  Build-Client:
    needs: [Test-Client]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: devops-client-app 
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: install dependencies
        run: npm install
      - name: build
        run: npm run build
        
  Test-Client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: devops-client-app 
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: install dependencies
        run: npm install
      - name: test
        run: npm test -- --coverage --watchAll=false